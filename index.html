<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek R1 Chat - Fixed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: #1e293b;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 20px 24px;
            border-bottom: 1px solid #334155;
        }

        .chat-header h1 {
            color: #38bdf8;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 8px;
        }

        .status-online {
            background: #10b981;
            color: white;
        }

        .status-error {
            background: #ef4444;
            color: white;
        }

        .status-warning {
            background: #f59e0b;
            color: white;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .user-message .message-avatar {
            background: #0ea5e9;
        }

        .assistant-message .message-avatar {
            background: #8b5cf6;
        }

        .message-content {
            flex: 1;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message .message-content {
            background: #0ea5e9;
            color: white;
        }

        .assistant-message .message-content {
            background: #334155;
            color: #e2e8f0;
        }

        .error-message {
            background: #7f1d1d !important;
            border-left: 4px solid #ef4444;
            color: #fecaca !important;
        }

        .chat-input-area {
            padding: 20px;
            background: #0f172a;
            border-top: 1px solid #334155;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 24px;
            padding: 12px 20px;
            color: #e2e8f0;
            font-size: 1rem;
            resize: none;
            font-family: inherit;
        }

        .chat-input:focus {
            outline: none;
            border-color: #0ea5e9;
        }

        .send-button {
            background: #0ea5e9;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-button:hover {
            background: #0284c7;
        }

        .send-button:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #334155;
            border-radius: 18px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 DeepSeek R1</h1>
            <div>
                <span class="status-badge" id="statusBadge">⏳ Checking API...</span>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message assistant-message">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    Halo! Saya DeepSeek R1. Silakan kirim pesan untuk memulai percakapan.
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <textarea 
                    class="chat-input" 
                    id="chatInput" 
                    placeholder="Tanyakan sesuatu... (Enter untuk kirim, Shift+Enter untuk baris baru)"
                    rows="1"
                ></textarea>
                <button class="send-button" id="sendButton">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // KONFIGURASI
        const API_KEY = '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';
        const MODEL = 'deepseek/deepseek-r1';
        const API_URL = 'https://openrouter.ai/api/v1/chat/completions';

        // STATE
        let isTyping = false;
        let apiStatus = 'checking';

        // TUNGGU DOM SIAP SEBELUM EKSEKUSI
        document.addEventListener('DOMContentLoaded', function() {
            
            // DOM Elements
            const chatMessages = document.getElementById('chatMessages');
            const chatInput = document.getElementById('chatInput');
            const sendButton = document.getElementById('sendButton');
            const statusBadge = document.getElementById('statusBadge');

            // VALIDASI ELEMEN
            if (!chatMessages) console.error('Element #chatMessages tidak ditemukan');
            if (!chatInput) console.error('Element #chatInput tidak ditemukan');
            if (!sendButton) console.error('Element #sendButton tidak ditemukan');
            if (!statusBadge) console.error('Element #statusBadge tidak ditemukan');

            // CEK API KEY
            async function checkAPIKey() {
                if (!statusBadge) return;
                
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${API_KEY}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            model: MODEL,
                            messages: [{ role: 'user', content: 'test' }],
                            max_tokens: 1
                        })
                    });

                    if (response.status === 401) {
                        statusBadge.className = 'status-badge status-error';
                        statusBadge.innerHTML = '❌ API Key Invalid - Periksa API Key Anda';
                        apiStatus = 'invalid';
                    } else if (response.status === 402) {
                        statusBadge.className = 'status-badge status-warning';
                        statusBadge.innerHTML = '⚠️ Saldo Habis - Top up di OpenRouter';
                        apiStatus = 'insufficient';
                    } else {
                        statusBadge.className = 'status-badge status-online';
                        statusBadge.innerHTML = '✅ API Ready - DeepSeek R1 Siap Digunakan';
                        apiStatus = 'ready';
                    }
                } catch (error) {
                    if (statusBadge) {
                        statusBadge.className = 'status-badge status-error';
                        statusBadge.innerHTML = '❌ Gagal Konek - Cek Koneksi Internet';
                    }
                    apiStatus = 'error';
                    console.error('API Check Error:', error);
                }
            }

            // FUNGSI UTAMA
            function addMessage(content, role, isError = false) {
                if (!chatMessages) return;
                
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${role === 'user' ? 'user-message' : 'assistant-message'}`;
                
                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = role === 'user' ? '👤' : '🤖';
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                if (isError) {
                    contentDiv.classList.add('error-message');
                }
                
                contentDiv.innerHTML = formatContent(content);
                
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(contentDiv);
                
                chatMessages.appendChild(messageDiv);
                scrollToBottom();
            }

            function formatContent(content) {
                let formatted = content
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                    .replace(/`([^`]+)`/g, '<code>$1</code>')
                    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                    .replace(/\n/g, '<br>');
                return formatted;
            }

            function getConversationHistory() {
                if (!chatMessages) return [];
                
                const messages = [];
                const messageElements = chatMessages.querySelectorAll('.message:not(.system-message)');
                
                for (let i = 0; i < messageElements.length; i++) {
                    const msgElement = messageElements[i];
                    const role = msgElement.classList.contains('user-message') ? 'user' : 'assistant';
                    const contentDiv = msgElement.querySelector('.message-content');
                    
                    if (contentDiv && !contentDiv.classList.contains('error-message')) {
                        const content = contentDiv.innerText;
                        messages.push({ role, content });
                    }
                    
                    if (messages.length > 20) break;
                }
                
                return messages;
            }

            function showTypingIndicator() {
                if (!chatMessages) return;
                
                isTyping = true;
                if (sendButton) sendButton.disabled = true;
                
                const typingDiv = document.createElement('div');
                typingDiv.className = 'message assistant-message';
                typingDiv.id = 'typingIndicator';
                
                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = '🤖';
                
                const indicator = document.createElement('div');
                indicator.className = 'typing-indicator';
                indicator.innerHTML = '<span></span><span></span><span></span>';
                
                typingDiv.appendChild(avatar);
                typingDiv.appendChild(indicator);
                
                chatMessages.appendChild(typingDiv);
                scrollToBottom();
            }

            function hideTypingIndicator() {
                isTyping = false;
                if (sendButton) sendButton.disabled = false;
                
                const indicator = document.getElementById('typingIndicator');
                if (indicator) indicator.remove();
            }

            function scrollToBottom() {
                if (chatMessages) {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            }

            async function callAPI(userMessage) {
                const messages = getConversationHistory();
                messages.push({ role: 'user', content: userMessage });

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: messages,
                        temperature: 0.7,
                        max_tokens: 2000
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(`${response.status}: ${error.error?.message || 'Unknown error'}`);
                }

                const data = await response.json();
                return data.choices[0].message.content;
            }

            async function sendMessage() {
                if (!chatInput || !sendButton) return;
                
                if (apiStatus !== 'ready') {
                    addMessage('⚠️ API sedang tidak siap. Tunggu hingga status online.', 'assistant', true);
                    return;
                }

                const message = chatInput.value.trim();
                if (!message || isTyping) return;

                chatInput.value = '';
                chatInput.style.height = 'auto';
                
                addMessage(message, 'user');
                showTypingIndicator();

                try {
                    const response = await callAPI(message);
                    hideTypingIndicator();
                    addMessage(response, 'assistant');
                } catch (error) {
                    hideTypingIndicator();
                    let errorMsg = error.message;
                    
                    if (errorMsg.includes('401')) {
                        errorMsg = '❌ API Key tidak valid. Periksa kembali API Key Anda.';
                    } else if (errorMsg.includes('402')) {
                        errorMsg = '💰 Saldo OpenRouter Anda habis. Silakan top up di dashboard.';
                    } else if (errorMsg.includes('429')) {
                        errorMsg = '⏰ Terlalu banyak request. Tunggu sebentar lalu coba lagi.';
                    } else if (errorMsg.includes('fetch')) {
                        errorMsg = '🌐 Gagal terhubung ke server. Cek koneksi internet Anda.';
                    }
                    
                    addMessage(errorMsg, 'assistant', true);
                }
            }

            // EVENT LISTENERS
            if (chatInput) {
                chatInput.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 150) + 'px';
                });

                chatInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });
            }

            if (sendButton) {
                sendButton.addEventListener('click', sendMessage);
            }

            // START
            checkAPIKey();
            if (chatInput) chatInput.focus();
        });
    </script>
</body>
</html>
